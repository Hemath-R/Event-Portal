{% extends "base.html" %}
{% block title %}Feedback · {{ event.title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="mb-1">Leave feedback</h3>
        <div class="text-muted mb-4">{{ event.title }}</div>
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="mb-3">
            <label class="form-label">Rating (1-5)</label>
            {{ form.rating }}
            <div class="text-danger small">{{ form.rating.errors }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Comment (optional)</label>
            {{ form.comment }}
            <div class="text-danger small">{{ form.comment.errors }}</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary">Submit</button>
            <a class="btn btn-outline-secondary" href="{% url 'events:event_detail' event.id %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
